<svg viewBox="0 0 1600 900" width="1600" height="900" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Noto Sans', 'Noto Sans KR', sans-serif; fill: #000; }
    .box { fill: #fff; stroke: #000; stroke-width: 4; }
    .stack { fill: none; stroke: #000; stroke-width: 3; stroke-dasharray: 14 10; }
    .soft { fill: #f2f2f2; stroke: #000; stroke-width: 4; }
    .redbox { fill: #f00; stroke: #000; stroke-width: 4; }
    .label { font-size: 38px; font-weight: 800; }
    .small { font-size: 24px; font-weight: 700; fill: #666; }
    .white { fill: #fff; }
    .red { fill: #f00; }
    .arrow { stroke: #000; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    .arrow-red { stroke: #f00; stroke-width: 5; fill: none; marker-end: url(#arrow-red); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L16,9 L2,16" fill="none" stroke="#000" stroke-width="3"/>
    </marker>
    <marker id="arrow-red" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L16,9 L2,16" fill="none" stroke="#f00" stroke-width="3"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#fff"/>

  <rect class="box" x="590" y="70" width="420" height="100"/>
  <text class="label" x="800" y="128" text-anchor="middle">I/O Manager</text>
  <text class="small" x="800" y="158" text-anchor="middle">IRP 생성 및 전달</text>

  <path class="arrow" d="M800 170 V330"/>

  <rect class="stack" x="430" y="245" width="740" height="565"/>
  <text class="small" x="575" y="292" text-anchor="middle">Driver Stack</text>

  <rect class="box" x="540" y="330" width="520" height="115"/>
  <text class="label" x="800" y="382" text-anchor="middle">ksthunk.sys</text>
  <text class="small" x="800" y="418" text-anchor="middle">진입점 · WoW64 호환성 처리</text>

  <path class="arrow" d="M800 445 V520"/>

  <rect class="redbox" x="540" y="520" width="520" height="120"/>
  <text class="label white" x="800" y="572" text-anchor="middle">ks.sys</text>
  <text class="small white" x="800" y="608" text-anchor="middle">클래스 드라이버 · 취약점 발생</text>

  <path class="arrow" d="M800 640 V715"/>

  <rect class="soft" x="540" y="715" width="520" height="95"/>
  <text class="label" x="800" y="770" text-anchor="middle">Minidriver</text>
  <text class="small" x="800" y="800" text-anchor="middle">하드웨어별 처리</text>

  <path class="arrow-red" d="M1060 580 H1260"/>
  <text class="label red" x="1300" y="592">검증 취약 지점</text>
</svg>
