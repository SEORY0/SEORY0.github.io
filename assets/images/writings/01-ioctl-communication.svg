<svg viewBox="0 0 1600 900" width="1600" height="900" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Noto Sans', 'Noto Sans KR', sans-serif; fill: #000; }
    .box { fill: #fff; stroke: #000; stroke-width: 4; }
    .soft { fill: #f2f2f2; stroke: #000; stroke-width: 4; }
    .label { font-size: 42px; font-weight: 800; }
    .small { font-size: 26px; font-weight: 700; fill: #666; }
    .code { font-size: 40px; font-weight: 800; }
    .red { fill: #f00; }
    .arrow-red { stroke: #f00; stroke-width: 5; fill: none; marker-end: url(#arrow-red); }
    .arrow-black { stroke: #000; stroke-width: 4; fill: none; stroke-dasharray: 16 10; marker-end: url(#arrow-black); }
  </style>
  <defs>
    <marker id="arrow-red" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L16,9 L2,16" fill="none" stroke="#f00" stroke-width="3"/>
    </marker>
    <marker id="arrow-black" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L16,9 L2,16" fill="none" stroke="#000" stroke-width="3"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#fff"/>

  <rect class="box" x="110" y="155" width="430" height="560"/>
  <text class="label" x="325" y="225" text-anchor="middle">User Mode</text>
  <text class="small" x="325" y="262" text-anchor="middle">사용자 영역 · Ring 3</text>

  <rect class="box" x="180" y="335" width="290" height="105"/>
  <text class="label" x="325" y="402" text-anchor="middle">Application</text>

  <rect class="soft" x="160" y="520" width="330" height="115"/>
  <text class="label" x="325" y="586" text-anchor="middle" style="font-size:38px">DeviceIoControl</text>
  <text class="small" x="325" y="623" text-anchor="middle">IOCTL Code + Buffer</text>

  <rect class="box" x="1060" y="155" width="430" height="560"/>
  <text class="label red" x="1275" y="225" text-anchor="middle">Kernel Mode</text>
  <text class="small" x="1275" y="262" text-anchor="middle">커널 영역 · Ring 0</text>

  <rect class="box" x="1130" y="335" width="290" height="105"/>
  <text class="label" x="1275" y="402" text-anchor="middle">Driver</text>

  <rect class="soft" x="1130" y="520" width="290" height="115"/>
  <text class="label" x="1275" y="586" text-anchor="middle">IRP</text>
  <text class="small" x="1275" y="623" text-anchor="middle">RequestorMode 포함</text>

  <path class="arrow-red" d="M470 386 H1130"/>
  <text class="code red" x="800" y="348" text-anchor="middle">IOCTL_KS_PROPERTY</text>

  <path class="arrow-black" d="M1130 578 H490"/>
  <text class="small" x="800" y="682" text-anchor="middle">결과 / 상태 코드 반환</text>
</svg>
