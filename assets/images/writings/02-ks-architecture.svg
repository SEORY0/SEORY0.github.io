<svg viewBox="0 0 1600 900" width="1600" height="900" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Noto Sans', 'Noto Sans KR', sans-serif; fill: #000; }
    .box { fill: #fff; stroke: #000; stroke-width: 4; }
    .redbox { fill: #f00; stroke: #000; stroke-width: 4; }
    .gray { fill: #666; stroke: #000; stroke-width: 4; }
    .label { font-size: 40px; font-weight: 800; }
    .small { font-size: 25px; font-weight: 700; fill: #666; }
    .white { fill: #fff; }
    .red { fill: #f00; }
    .line { stroke: #000; stroke-width: 4; fill: none; }
    .arrow-red { stroke: #f00; stroke-width: 5; fill: none; marker-end: url(#arrow-red); }
    .arrow-black { stroke: #000; stroke-width: 4; fill: none; marker-end: url(#arrow-black); }
  </style>
  <defs>
    <marker id="arrow-red" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L16,9 L2,16" fill="none" stroke="#f00" stroke-width="3"/>
    </marker>
    <marker id="arrow-black" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L16,9 L2,16" fill="none" stroke="#000" stroke-width="3"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#fff"/>

  <line class="line" x1="120" y1="235" x2="1480" y2="235"/>
  <text class="label" x="160" y="195">User Mode</text>
  <text class="label red" x="160" y="295">Kernel Mode</text>

  <rect class="box" x="580" y="80" width="440" height="100"/>
  <text class="label" x="800" y="145" text-anchor="middle">Application</text>

  <path class="arrow-red" d="M800 180 V330"/>
  <text class="label red" x="860" y="275">IOCTL_KS_PROPERTY</text>

  <rect class="box" x="580" y="330" width="440" height="115"/>
  <text class="label" x="800" y="382" text-anchor="middle">ksthunk.sys</text>
  <text class="small" x="800" y="420" text-anchor="middle">32/64비트 호환성 처리</text>
  <text class="small" x="1060" y="395">진입점</text>

  <path class="arrow-black" d="M800 445 V545"/>
  <rect class="redbox" x="580" y="545" width="440" height="115"/>
  <text class="label white" x="800" y="596" text-anchor="middle">ks.sys</text>
  <text class="small white" x="800" y="634" text-anchor="middle">Class Driver · 핵심 처리</text>
  <text class="small" x="1060" y="610">속성/메서드 IOCTL 처리</text>

  <path class="arrow-black" d="M800 660 V735"/>
  <rect class="gray" x="580" y="735" width="440" height="115"/>
  <text class="label white" x="800" y="787" text-anchor="middle">Minidriver</text>
  <text class="small white" x="800" y="825" text-anchor="middle">하드웨어별 처리</text>
  <text class="small" x="1060" y="800">디바이스별 구현</text>
</svg>
