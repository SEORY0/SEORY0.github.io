<svg viewBox="0 0 1600 900" width="1600" height="900" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Noto Sans', 'Noto Sans KR', sans-serif; fill: #000; }
    .box { fill: #fff; stroke: #000; stroke-width: 4; }
    .soft { fill: #f2f2f2; stroke: #000; stroke-width: 4; }
    .gray { fill: #666; stroke: #000; stroke-width: 4; }
    .redbox { fill: #f00; stroke: #000; stroke-width: 4; }
    .label { font-size: 34px; font-weight: 800; }
    .small { font-size: 22px; font-weight: 700; fill: #666; }
    .white { fill: #fff; }
    .red { fill: #f00; }
    .arrow-red { stroke: #f00; stroke-width: 5; fill: none; marker-end: url(#arrow-red); }
  </style>
  <defs>
    <marker id="arrow-red" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L16,9 L2,16" fill="none" stroke="#f00" stroke-width="3"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#fff"/>

  <text class="label" x="120" y="85">Fake rcx @ 0x10000000</text>
  <g transform="translate(120 125)">
    <rect class="soft" x="0" y="0" width="660" height="80"/>
    <text class="label" x="85" y="52" text-anchor="middle">Offset</text>
    <text class="label" x="285" y="52" text-anchor="middle">Field</text>
    <text class="label" x="525" y="52" text-anchor="middle">Value</text>

    <rect class="box" x="0" y="80" width="170" height="95"/>
    <rect class="box" x="170" y="80" width="220" height="95"/>
    <rect class="box" x="390" y="80" width="270" height="95"/>
    <text class="label" x="85" y="140" text-anchor="middle">0x00</text>
    <text class="label red" x="280" y="140" text-anchor="middle">[rcx]</text>
    <text class="small" x="525" y="140" text-anchor="middle" style="font-size:20px">&amp;PreviousMode - 0x2078</text>

    <rect class="box" x="0" y="175" width="170" height="95"/>
    <rect class="gray" x="170" y="175" width="220" height="95"/>
    <rect class="gray" x="390" y="175" width="270" height="95"/>
    <text class="label" x="85" y="235" text-anchor="middle">0x08</text>
    <text class="label white" x="280" y="235" text-anchor="middle">빈 공간</text>
    <text class="label white" x="525" y="235" text-anchor="middle">-</text>

    <rect class="box" x="0" y="270" width="170" height="95"/>
    <rect class="redbox" x="170" y="270" width="220" height="95"/>
    <rect class="redbox" x="390" y="270" width="270" height="95"/>
    <text class="label" x="85" y="330" text-anchor="middle">0x10</text>
    <text class="label white" x="280" y="330" text-anchor="middle">[rcx+10]</text>
    <text class="label white" x="525" y="330" text-anchor="middle" style="font-size:28px">0x00000800</text>

    <rect class="box" x="0" y="365" width="170" height="95"/>
    <rect class="redbox" x="170" y="365" width="220" height="95"/>
    <rect class="redbox" x="390" y="365" width="270" height="95"/>
    <text class="label" x="85" y="425" text-anchor="middle">0x14</text>
    <text class="label white" x="280" y="425" text-anchor="middle">[rcx+14]</text>
    <text class="label white" x="525" y="425" text-anchor="middle" style="font-size:28px">0x00100100</text>
  </g>

  <path class="arrow-red" d="M780 445 H860 V512 H940"/>

  <g transform="translate(940 195)">
    <text class="label" x="280" y="-35" text-anchor="middle" style="font-size:30px">DbgkpTriageDumpRestoreState</text>
    <rect class="box" x="0" y="0" width="560" height="145"/>
    <text class="label" x="280" y="60" text-anchor="middle" style="font-size:28px">[[rcx]+0x2078] = [rcx+0x10]</text>
    <text class="label red" x="280" y="105" text-anchor="middle">PreviousMode = 0</text>

    <rect class="soft" x="0" y="245" width="560" height="145"/>
    <text class="label" x="280" y="305" text-anchor="middle">KTHREAD + 0x232</text>
    <text class="label red" x="280" y="350" text-anchor="middle">1 → 0</text>
  </g>

  <text class="small" x="120" y="690">rcx 하위 4바이트만 전달되므로 낮은 사용자 주소에 fake 구조체를 배치한다.</text>
</svg>
