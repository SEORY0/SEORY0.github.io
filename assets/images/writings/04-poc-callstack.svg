<svg viewBox="0 0 1600 900" width="1600" height="900" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Noto Sans', 'Noto Sans KR', sans-serif; fill: #000; }
    .row { fill: #fff; stroke: #000; stroke-width: 4; }
    .soft { fill: #f2f2f2; stroke: #000; stroke-width: 4; }
    .redline { fill: #fff; stroke: #f00; stroke-width: 5; }
    .redbox { fill: #f00; stroke: #000; stroke-width: 4; }
    .label { font-size: 34px; font-weight: 800; }
    .small { font-size: 23px; font-weight: 700; fill: #666; }
    .white { fill: #fff; }
    .red { fill: #f00; }
    .arrow-black { stroke: #000; stroke-width: 4; fill: none; marker-end: url(#arrow-black); }
    .arrow-red { stroke: #f00; stroke-width: 5; fill: none; marker-end: url(#arrow-red); }
  </style>
  <defs>
    <marker id="arrow-black" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L16,9 L2,16" fill="none" stroke="#000" stroke-width="3"/>
    </marker>
    <marker id="arrow-red" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L16,9 L2,16" fill="none" stroke="#f00" stroke-width="3"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#fff"/>

  <g transform="translate(160 70)">
    <rect class="soft" x="0" y="0" width="1280" height="90"/>
    <text class="label" x="60" y="56">DeviceIoControl</text>
    <text class="small" x="1215" y="56" text-anchor="end">IOCTL_KS_PROPERTY / UserMode</text>

    <path class="arrow-black" d="M640 90 V125"/>
    <rect class="row" x="0" y="125" width="1280" height="90"/>
    <text class="label" x="60" y="181">ks!KspPropertyHandler</text>
    <text class="small" x="1215" y="181" text-anchor="end">flags 확인</text>

    <path class="arrow-black" d="M640 215 V250"/>
    <rect class="row" x="0" y="250" width="1280" height="90"/>
    <text class="label red" x="60" y="306">ks!UnserializePropertySet</text>
    <text class="small" x="1215" y="306" text-anchor="end">property 재처리</text>

    <path class="arrow-black" d="M640 340 V375"/>
    <rect class="redline" x="0" y="375" width="1280" height="90"/>
    <text class="label red" x="60" y="431">ks!KsSynchronousIoControlDevice</text>
    <text class="small red" x="1215" y="431" text-anchor="end">New IRP: KernelMode</text>

    <path class="arrow-black" d="M640 465 V500"/>
    <rect class="soft" x="0" y="500" width="1280" height="90"/>
    <text class="label" x="60" y="556" style="font-size:29px">ksthunk!CKSThunkDevice::CheckIrpForStackAdjustmentNative</text>
    <text class="small" x="1215" y="556" text-anchor="end">검증 우회</text>

    <path class="arrow-red" d="M640 590 V625"/>
    <rect class="redbox" x="0" y="625" width="1280" height="90"/>
    <text class="label white" x="60" y="681">ksthunk!guard_dispatch_icall_nop</text>
    <text class="label white" x="1215" y="681" text-anchor="end">jmp rax</text>
  </g>
</svg>
