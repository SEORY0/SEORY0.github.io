---
layout: wiki-page
page_title: "Archive"
toolbar_left: "Writings"
---

<div class="archive-list">
  {% for post in site.posts %}
  <a href="{{ post.url | relative_url }}" class="archive-entry">
    <span class="archive-date">{{ post.date | date: "%Y-%b-%d" | upcase }}</span>
    <span class="archive-title">{{ post.title }}</span>
  </a>
  {% endfor %}
</div>
