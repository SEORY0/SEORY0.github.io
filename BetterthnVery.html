                if (currentIndex < text.length) {

                        setDisplayText(prev => prev + text[currentIndex]);
                        setCurrentIndex(prev => prev + 1);

                    return () => clearTimeout(timeout);

                'kind': ['compassionate', 'benevolent', 'generous', 'considerate', 'tender'],
                'cruel': ['brutal', 'savage', 'ruthless', 'merciless', 'heartless'],
                'gentle': ['tender', 'mild', 'soft', 'delicate', 'soothing'],
                'harsh': ['severe', 'stern', 'strict', 'rigid', 'unforgiving'],
                'fair': ['just', 'equitable', 'impartial', 'unbiased', 'reasonable'],
                'unfair': ['unjust', 'inequitable', 'biased', 'prejudiced', 'discriminatory']
            };

            const getSuggestion = async (refresh = false) => {
                if (!adjective.trim() || isLoading) return;

                // Check for Pepero Day easter egg
                if (checkPeperoDay(adjective)) {
                    setShowPeperoGift(true);
                    return;
                }

                setIsLoading(true);
                setFade(true);
                setError(false);

                // Simulate API delay for realistic feel
                await new Promise(resolve => setTimeout(resolve, 500));

                try {
                    const normalizedAdjective = adjective.toLowerCase().trim();
                    const suggestions = wordDictionary[normalizedAdjective];

                    if (suggestions && suggestions.length > 0) {
                        // Filter out previously suggested words if refresh is true
                        let availableSuggestions = suggestions;
                        if (refresh && previousSuggestions.length > 0) {
                            availableSuggestions = suggestions.filter(
                                word => !previousSuggestions.includes(word)
                            );
                            
                            // If all suggestions have been used, reset and start over
                            if (availableSuggestions.length === 0) {
                                availableSuggestions = suggestions;
                                setPreviousSuggestions([]);
                            }
                        }

                        // Pick a random suggestion from available ones
                        const randomIndex = Math.floor(Math.random() * availableSuggestions.length);
                        const selectedWord = availableSuggestions[randomIndex];
                        
                        setSuggestion(selectedWord);
                        setPreviousSuggestions(prev => [...prev, selectedWord]);
                    } else {
                        // If word not in dictionary, show error
                        setError(true);
                        setSuggestion('');
                    }
                } catch (error) {
                    console.error('Error fetching suggestion:', error);
                    setError(true);
                    setSuggestion('');
                } finally {
                    setIsLoading(false);
                    setFade(false);
                }
            };

            const handleInputChange = (e) => {
                setAdjective(e.target.value);
                setSuggestion('');
                setPreviousSuggestions([]);
                setError(false);
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter') {
                    getSuggestion();
                }
            };

            const handleRefresh = () => {
                if (suggestion && !isLoading) {
                    getSuggestion(true);
                }
            };

                    className="min-h-screen transition-colors duration-300"
                    style={{ 
                        backgroundColor: isDark ? '#1B1917' : '#FAFAF9',
                        color: isDark ? '#ffffff' : '#1B1917'
                    }}
                >
                    {/* Header */}
                    <header className="absolute top-0 left-0 right-0 flex justify-between items-center p-6">
                        <h1 
                            className="text-2xl font-serif italic font-light"
                            style={{ color: '#A8A29D' }}
                        >
                            Better than very
                        </h1>
                        <button
                            onClick={() => setIsDark(!isDark)}
                            className={`p-2 rounded-full transition-colors ${
                                isDark ? 'hover:bg-gray-800' : 'hover:bg-gray-100'
                            }`}
                            aria-label="Toggle theme"
                        >
                            {isDark ? <Sun className="w-5 h-5" /> : <Moon className="w-5 h-5" />}
                        </button>
                    </header>

                    {/* Main content - centered on page */}
                    <main className="min-h-screen flex items-center justify-center">
                        <div className="w-full max-w-2xl px-6 space-y-8">
                            {/* Input section */}
                            <div 
                                className={`flex flex-col items-center gap-3 transition-transform duration-500 ease-out ${
                                    suggestion || error ? '-translate-y-4' : 'translate-y-0'
                                }`}
                            >
                                <div className="flex items-baseline gap-4 text-4xl font-serif">
                                    <span>Very</span>
                                    <div className="relative flex items-baseline gap-2">
                                        <input
                                            type="text"
                                            value={adjective}
                                            onChange={handleInputChange}
                                            onKeyPress={handleKeyPress}
                                            onBlur={() => adjective && !suggestion && getSuggestion()}
                                            placeholder="happy"
                                            className="border-b transition-colors duration-300 bg-transparent outline-none text-center text-4xl font-serif pb-3"
                                            style={{
                                                borderColor: '#A8A29D',
                                                color: isDark ? '#ffffff' : '#1B1917',
                                                width: '16rem',
                                                borderBottomWidth: '1px'
                                            }}
                                        />
                                        <button
                                            onClick={() => adjective && getSuggestion()}
                                            className={`p-2 transition-colors relative top-1 ${!adjective ? 'opacity-50 cursor-not-allowed' : ''}`}
                                            style={{
                                                color: '#A8A29D'
                                            }}
                                            disabled={!adjective}
                                            aria-label="Search for alternative"
                                        >
                                            <Search className="w-5 h-5" />
                                        </button>
                                    </div>
                                </div>
                                
                                {/* Easter egg hint */}
                                <div 
                                    className="text-sm font-serif italic opacity-60 mt-2"
                                    style={{ color: '#A8A29D' }}
                                >
                                    "행복한 빼빼로 데이"를 입력하면 기분 좋은 일이 있을지도?
                                </div>
                            </div>

                            {/* Result section */}
                            {suggestion && (
                                <div 
                                    className={`transition-opacity duration-300 ${
                                        fade ? 'opacity-0' : 'opacity-100'
                                    }`}
                                >
                                    <div className="flex flex-col items-center">
                                        <div className="flex items-center gap-3">
                                            <div className="text-6xl font-serif">
                                                "<TypewriterText text={suggestion} />"
                                            </div>
                                            <button
                                                onClick={handleRefresh}
                                                disabled={isLoading}
                                                className={`p-2 rounded-full transition-all duration-300 ${
                                                    isDark 
                                                        ? 'hover:bg-gray-800 disabled:opacity-50' 
                                                        : 'hover:bg-gray-100 disabled:opacity-50'
                                                } ${isLoading ? 'animate-spin' : ''}`}
                                                aria-label="Get another suggestion"
                                            >
                                                <RefreshCw className="w-4 h-4" />
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Error state */}
                            {error && (
                                <div 
                                    className="flex justify-center animate-shake"
                                >
                                    <div 
                                        className="text-2xl font-serif"
                                        style={{ color: '#EF4444' }}
                                    >
                                        Let's try again
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Pepero Day Gift Modal */}
                    {showPeperoGift && (
                        <PeperoGiftCard 
                            isDark={isDark} 
                            onClose={() => {
                                setShowPeperoGift(false);
                                setAdjective('');
                            }} 
                        />
                    )}

                    {/* Footer */}
                    <footer className="absolute bottom-0 left-0 right-0 p-4 text-center">
                        <p 
                            className="text-xs font-serif"
                            style={{ color: '#A8A29D' }}
                        >
                            © 2025 SEORY0
                        </p>
                    </footer>
                </div>
            );
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
