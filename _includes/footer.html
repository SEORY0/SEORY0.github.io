<footer class="site-footer">
  <div class="site-footer-box">
    <div class="site-footer-inner">
      {% if include.show_lastmod %}
      <p class="site-footer-lastmod">Last edited {{ site.time | date: "%Y-%m-%d" }}</p>
      {% endif %}

      <p class="site-footer-links">
        <a href="https://github.com/SEORY0/SEORY0.github.io" target="_blank" rel="noopener">Source on GitHub</a>
        <span class="sep">·</span>
        <a href="{{ '/atom.xml' | relative_url }}">Atom feed</a>
        <span class="sep">·</span>
        <a href="{{ '/sitemap.xml' | relative_url }}">Sitemap</a>
      </p>

      <p class="site-footer-copy">
        &copy; {{ site.time | date: "%Y" }} SEORY0 &middot; 류석준 / Seokjun Ryu
      </p>
    </div>

    <div class="site-footer-brand" aria-hidden="true">KERNEL PAN<span class="accent">!</span>C</div>
  </div>
</footer>
