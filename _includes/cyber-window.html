<div id="cyber-overlay" class="cyber-overlay" onclick="closeCyberWindow(event)" role="dialog" aria-modal="true" aria-labelledby="cyber-window-title">
  <div class="cyber-window" onclick="event.stopPropagation()">
    <span class="cyber-label">SYSTEM_ACCESS</span>
    <div class="cyber-header">
      <div>
        <p class="cyber-status">Status: Active</p>
      </div>
      <button class="cyber-close-x" onclick="closeCyberWindow()" aria-label="Close">&times;</button>
    </div>
    <div class="cyber-title" id="cyber-window-title">NULL_PTR</div>
    <div class="cyber-body">
      <div class="cyber-body-inner" id="cyber-window-body">Initializing...</div>
    </div>
    <div class="cyber-actions">
      <button class="cyber-close" onclick="closeCyberWindow()">CLOSE</button>
    </div>
    <div class="cyber-footer">
      <span>LOC://SEORY0.local</span>
      <span id="cyber-coords">x:0000 y:0000</span>
    </div>
  </div>
</div>
